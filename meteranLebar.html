
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
#meter-root { width: 100%; min-height: 400px; overflow: hidden; font-family: Arial, sans-serif; position: relative; }
#layer-dial { position: absolute; pointer-events: none; }
#layer-meter { position: absolute; pointer-events: none; }
#dial-svg { pointer-events: none; display: block; }
#dial-hitarea { pointer-events: all; cursor: grab; fill: none; }
#dial-hitarea:active { cursor: grabbing; }
#housing {
  width: 64px; height: 64px; border-radius: 50%;
  background: #E04B2A; border: 3px solid #A8321A;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; cursor: grab; pointer-events: all;
  position: absolute; top: 0; left: 0;
}
#housing:active { cursor: grabbing; }
.h-inner { width: 22px; height: 22px; border-radius: 50%; background: #C03C22; border: 2px solid #fff; }
.h-label { font-size: 7px; font-weight: 700; color: #fff; margin-top: 2px; letter-spacing: 0.5px; }
#tape-group { position: absolute; top: 0; left: 0; pointer-events: none; transform-origin: 32px 32px; }
#tape-wrap { width: 64px; background: #F5C842; border: 2px solid #C8951A; border-top: none; border-radius: 0 0 6px 6px; overflow: hidden; position: absolute; top: 64px; left: 0; }
canvas { display: block; width: 64px; }
#hook { width: 48px; height: 16px; background: #ccc; border: 2px solid #999; border-radius: 4px;
  display: flex; align-items: center; justify-content: center; font-size: 11px; color: #555;
  cursor: ns-resize; pointer-events: all; position: absolute; left: 8px; }
</style>

<div id="meter-root">
  <div id="layer-dial">
    <svg id="dial-svg" width="108" height="108" viewBox="0 0 108 108">
      <circle cx="54" cy="54" r="48" fill="none" stroke="#ccc" stroke-width="7" stroke-dasharray="4 5"/>
      <circle id="dial-track" cx="54" cy="54" r="48" fill="none" stroke="#E04B2A" stroke-width="7"
        stroke-dasharray="0 302" stroke-linecap="round" transform="rotate(-90 54 54)" opacity="0.85"/>
      <circle id="dial-thumb" cx="54" cy="6" r="7" fill="#fff" stroke="#E04B2A" stroke-width="2.5"/>
      <path id="dial-hitarea"
        d="M54,2 A52,52,0,1,1,53.99,2 Z M54,40 A14,14,0,1,0,54.01,40 Z"
        fill-rule="evenodd" fill="rgba(0,0,0,0)" pointer-events="all" style="cursor:grab"/>
    </svg>
  </div>
  <div id="layer-meter">
    <div id="housing">
      <div class="h-inner"></div>
      <span class="h-label">METERAN</span>
    </div>
    <div id="tape-group">
      <div id="tape-wrap"><canvas id="ruler-canvas"></canvas></div>
      <div id="hook">⟷</div>
    </div>
  </div>
</div>

<script>
const root = document.getElementById('meter-root');
const layerDial  = document.getElementById('layer-dial');
const layerMeter = document.getElementById('layer-meter');
const dialTrack  = document.getElementById('dial-track');
const dialThumb  = document.getElementById('dial-thumb');
const dialHit    = document.getElementById('dial-hitarea');
const housing    = document.getElementById('housing');
const tapeGroup  = document.getElementById('tape-group');
const tapeWrap   = document.getElementById('tape-wrap');
const hook       = document.getElementById('hook');
const canvas     = document.getElementById('ruler-canvas');
const ctx        = canvas.getContext('2d');

const TAPE_W = 64, PX_PER_CM = 20, MAX_CM = 100;
const R = 48, CIRC = 2 * Math.PI * R;
let hx = root.offsetWidth / 2 - 32;
let hy = 60;
let rotation = 0;
let tapePx = 0;
const DIAL_OFFSET = 22;

function positionAll() {
  layerMeter.style.left = hx + 'px';
  layerMeter.style.top  = hy + 'px';
  tapeGroup.style.transform = `rotate(${rotation}deg)`;
  housing.style.transform   = `rotate(${rotation}deg)`;
  layerDial.style.left = (hx - DIAL_OFFSET) + 'px';
  layerDial.style.top  = (hy - DIAL_OFFSET) + 'px';
}

function updateDial() {
  const norm = ((rotation % 360) + 360) % 360;
  const arc  = (norm / 360) * CIRC;
  dialTrack.setAttribute('stroke-dasharray', arc + ' ' + CIRC);
  const rad = (norm - 90) * Math.PI / 180;
  dialThumb.setAttribute('cx', 54 + R * Math.cos(rad));
  dialThumb.setAttribute('cy', 54 + R * Math.sin(rad));
}

positionAll();
updateDial();

function drawRuler(h) {
  const totalCm = Math.ceil(h / PX_PER_CM) + 1;
  const ch = Math.max(totalCm * PX_PER_CM + 10, 10);
  canvas.width = TAPE_W; canvas.height = ch; canvas.style.height = ch + 'px';
  ctx.fillStyle = '#F5C842'; ctx.fillRect(0, 0, TAPE_W, ch);
  for (let mm = 0; mm <= totalCm * 10; mm++) {
    const y = mm * (PX_PER_CM / 10);
    let tw, lw;
    if      (mm % 100 === 0) { tw = 32; lw = 1.5; }
    else if (mm % 50  === 0) { tw = 24; lw = 1.2; }
    else if (mm % 10  === 0) { tw = 18; lw = 1.0; }
    else if (mm % 5   === 0) { tw = 12; lw = 0.7; }
    else                     { tw = 7;  lw = 0.5; }
    ctx.strokeStyle = '#8A6010'; ctx.lineWidth = lw;
    ctx.beginPath(); ctx.moveTo(TAPE_W, y); ctx.lineTo(TAPE_W - tw, y); ctx.stroke();
  }
  ctx.fillStyle = '#5A3A08'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'right';
  for (let cm = 5; cm <= totalCm; cm += 5)
    ctx.fillText(cm, TAPE_W - 34, cm * PX_PER_CM + 4);
}

function updateTape(px) {
  tapePx = Math.max(0, Math.min(px, MAX_CM * PX_PER_CM));
  tapeWrap.style.height = tapePx + 'px';
  hook.style.top = (64 + tapePx) + 'px';
  drawRuler(tapePx);
}
updateTape(0);

let mode = null;
let mox = 0, moy = 0;
let tsy = 0, tsp = 0;

function getOffset(e) {
  const r = root.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}
function getOffsetTouch(e) {
  const r = root.getBoundingClientRect();
  return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
}

function dialAngle(ex, ey) {
  const cx = hx + 32, cy = hy + 32;
  return ((Math.atan2(ey - cy, ex - cx) * 180 / Math.PI + 90) % 360 + 360) % 360;
}

housing.addEventListener('mousedown', e => {
  mode = 'move';
  const o = getOffset(e);
  mox = o.x - hx; moy = o.y - hy;
  e.stopPropagation(); e.preventDefault();
});
housing.addEventListener('touchstart', e => {
  mode = 'move';
  const o = getOffsetTouch(e);
  mox = o.x - hx; moy = o.y - hy;
  e.stopPropagation(); e.preventDefault();
}, { passive: false });

hook.addEventListener('mousedown', e => {
  mode = 'tape';
  tsy = getOffset(e).y; tsp = tapePx;
  e.stopPropagation(); e.preventDefault();
});
hook.addEventListener('touchstart', e => {
  mode = 'tape';
  tsy = getOffsetTouch(e).y; tsp = tapePx;
  e.stopPropagation(); e.preventDefault();
}, { passive: false });

dialHit.addEventListener('mousedown', e => {
  mode = 'dial'; e.stopPropagation(); e.preventDefault();
});
dialHit.addEventListener('touchstart', e => {
  mode = 'dial'; e.stopPropagation(); e.preventDefault();
}, { passive: false });

document.addEventListener('mousemove', e => {
  if (!mode) return;
  const o = getOffset(e);
  if (mode === 'move') {
    hx = o.x - mox; hy = o.y - moy; positionAll();
  } else if (mode === 'dial') {
    rotation = dialAngle(o.x, o.y); positionAll(); updateDial();
  } else if (mode === 'tape') {
    updateTape(tsp + (o.y - tsy));
  }
});
document.addEventListener('touchmove', e => {
  if (!mode) return;
  const o = getOffsetTouch(e);
  if (mode === 'move') {
    hx = o.x - mox; hy = o.y - moy; positionAll();
  } else if (mode === 'dial') {
    rotation = dialAngle(o.x, o.y); positionAll(); updateDial();
  } else if (mode === 'tape') {
    updateTape(tsp + (o.y - tsy));
  }
  e.preventDefault();
}, { passive: false });

document.addEventListener('mouseup',  () => { mode = null; });
document.addEventListener('touchend', () => { mode = null; });
</script>
