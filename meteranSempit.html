<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteran</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
  }
  #scene {
    width: 100vw; height: 100vh;
    position: relative;
  }
  #meter-group {
    position: absolute;
    top: 80px; left: 80px;
    transform-origin: 32px 32px;
    cursor: move;
    touch-action: none;
  }
  #housing {
    width: 64px; height: 64px; border-radius: 50%;
    background: #E04B2A; border: 3px solid #A8321A;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    position: relative; z-index: 2;
    cursor: move;
  }
  .housing-inner {
    width: 22px; height: 22px; border-radius: 50%;
    background: #C03C22; border: 2px solid #fff;
  }
  .housing-label {
    font-size: 7px; font-weight: 700; color: #fff;
    margin-top: 2px; letter-spacing: 0.5px;
    font-family: Arial, sans-serif;
  }
  #tape-wrap {
    position: absolute;
    top: 64px; left: 0;
    width: 64px;
    background: #F5C842;
    border: 2px solid #C8951A;
    border-top: none;
    border-radius: 0 0 6px 6px;
    overflow: hidden;
    height: 0;
  }
  #ruler-canvas { display: block; width: 64px; }
  #hook {
    position: absolute;
    left: 8px;
    width: 48px; height: 18px;
    background: #ccc; border: 2px solid #999;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #555;
    cursor: ns-resize;
    font-family: Arial, sans-serif;
    z-index: 3;
  }
  #btn-rotate {
    position: absolute;
    top: 14px; left: 68px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #fff;
    border: 1.5px solid #bbb;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
    font-size: 14px;
    line-height: 1;
    user-select: none;
  }
  #btn-rotate:hover { background: #f0f0f0; }
</style>
</head>
<body>
<div id="scene">
  <div id="meter-group">
    <div id="housing">
      <div class="housing-inner"></div>
      <span class="housing-label">METERAN</span>
    </div>
    <div id="tape-wrap">
      <canvas id="ruler-canvas"></canvas>
    </div>
    <div id="hook">⟷</div>
    <div id="btn-rotate">↻</div>
  </div>
</div>

<script>
const group = document.getElementById('meter-group');
const housing = document.getElementById('housing');
const tapeWrap = document.getElementById('tape-wrap');
const hook = document.getElementById('hook');
const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d');
const btnRotate = document.getElementById('btn-rotate');

const MAX_CM = 300;
const TAPE_W = 64;
const PX_PER_CM = 3;
const HOUSING_H = 64;

let tapePx = 0;
let angle = 0; // degrees
let posX = 80, posY = 80;

let draggingTape = false;
let draggingGroup = false;
let startY = 0, startTape = 0;
let startX = 0;
let dragStartX = 0, dragStartY = 0;
let groupStartX = 0, groupStartY = 0;

let isRolled = true; // starts rolled up

function drawRuler(heightPx) {
  const totalCm = Math.ceil(heightPx / PX_PER_CM) + 1;
  const h = Math.max(totalCm * PX_PER_CM + 10, 10);
  canvas.width = TAPE_W;
  canvas.height = h;
  canvas.style.height = h + 'px';

  ctx.fillStyle = '#F5C842';
  ctx.fillRect(0, 0, TAPE_W, h);

  for (let cm = 0; cm <= totalCm; cm++) {
    const y = cm * PX_PER_CM;
    let tickW, lw;
    if (cm % 10 === 0)     { tickW = 30; lw = 1.5; }
    else if (cm % 5 === 0) { tickW = 20; lw = 1; }
    else                    { tickW = 12; lw = 0.8; }
    ctx.strokeStyle = '#8A6010';
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.moveTo(TAPE_W, y);
    ctx.lineTo(TAPE_W - tickW, y);
    ctx.stroke();
  }

  ctx.fillStyle = '#5A3A08';
  ctx.font = 'bold 11px Arial, sans-serif';
  ctx.textAlign = 'right';
  for (let cm = 10; cm <= totalCm; cm += 10) {
    ctx.fillText(cm, TAPE_W - 32, cm * PX_PER_CM + 4);
  }
}

function updateTape(px) {
  tapePx = Math.max(0, Math.min(px, MAX_CM * PX_PER_CM));
  tapeWrap.style.height = tapePx + 'px';
  hook.style.top = (HOUSING_H + tapePx) + 'px';
  drawRuler(tapePx);
}

function applyTransform() {
  group.style.left = posX + 'px';
  group.style.top = posY + 'px';
  group.style.transform = `rotate(${angle}deg)`;
}

// Animate roll out
function animateRollOut() {
  let target = 60 * PX_PER_CM;
  let cur = 0;
  const step = () => {
    cur = Math.min(cur + 8, target);
    updateTape(cur);
    if (cur < target) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// Animate roll in
function animateRollIn(cb) {
  let cur = tapePx;
  const step = () => {
    cur = Math.max(0, cur - 12);
    updateTape(cur);
    if (cur > 0) requestAnimationFrame(step);
    else if (cb) cb();
  };
  requestAnimationFrame(step);
}

// Click housing = toggle roll
housing.addEventListener('click', e => {
  e.stopPropagation();
  if (isRolled) {
    isRolled = false;
    animateRollOut();
  } else {
    isRolled = true;
    animateRollIn();
  }
});

// Rotate button
btnRotate.addEventListener('click', e => {
  e.stopPropagation();
  angle = (angle + 90) % 360;
  applyTransform();
});

// Drag group (housing as handle)
housing.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  draggingGroup = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  groupStartX = posX;
  groupStartY = posY;
  e.preventDefault();
  e.stopPropagation();
});

housing.addEventListener('touchstart', e => {
  draggingGroup = true;
  dragStartX = e.touches[0].clientX;
  dragStartY = e.touches[0].clientY;
  groupStartX = posX;
  groupStartY = posY;
  e.stopPropagation();
}, { passive: true });

// Drag hook = extend tape
hook.addEventListener('mousedown', e => {
  draggingTape = true;
  // Convert client coords to local (account for rotation)
  const rad = angle * Math.PI / 180;
  const dx = e.clientX - (posX + 32);
  const dy = e.clientY - (posY + 32);
  // project onto local Y axis
  startY = -dx * Math.sin(rad) + dy * Math.cos(rad);
  startTape = tapePx;
  e.preventDefault();
  e.stopPropagation();
});

hook.addEventListener('touchstart', e => {
  draggingTape = true;
  const rad = angle * Math.PI / 180;
  const dx = e.touches[0].clientX - (posX + 32);
  const dy = e.touches[0].clientY - (posY + 32);
  startY = -dx * Math.sin(rad) + dy * Math.cos(rad);
  startTape = tapePx;
  e.stopPropagation();
}, { passive: true });

document.addEventListener('mousemove', e => {
  if (draggingGroup) {
    posX = groupStartX + (e.clientX - dragStartX);
    posY = groupStartY + (e.clientY - dragStartY);
    applyTransform();
  }
  if (draggingTape) {
    const rad = angle * Math.PI / 180;
    const dx = e.clientX - (posX + 32);
    const dy = e.clientY - (posY + 32);
    const localY = -dx * Math.sin(rad) + dy * Math.cos(rad);
    updateTape(startTape + (localY - startY));
  }
});

document.addEventListener('touchmove', e => {
  if (draggingGroup) {
    posX = groupStartX + (e.touches[0].clientX - dragStartX);
    posY = groupStartY + (e.touches[0].clientY - dragStartY);
    applyTransform();
  }
  if (draggingTape) {
    const rad = angle * Math.PI / 180;
    const dx = e.touches[0].clientX - (posX + 32);
    const dy = e.touches[0].clientY - (posY + 32);
    const localY = -dx * Math.sin(rad) + dy * Math.cos(rad);
    updateTape(startTape + (localY - startY));
  }
}, { passive: true });

document.addEventListener('mouseup', () => { draggingGroup = false; draggingTape = false; });
document.addEventListener('touchend', () => { draggingGroup = false; draggingTape = false; });

// Init
drawRuler(0);
hook.style.top = HOUSING_H + 'px';
applyTransform();
</script>
</body>
</html>
