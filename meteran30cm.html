<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meteran Vertikal</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 16px 8px;
    font-family: Arial, sans-serif;
  }
  .tape-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }
  .housing {
    width: 64px; height: 64px; border-radius: 50%;
    background: #E04B2A; border: 3px solid #A8321A;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; flex-shrink: 0;
    cursor: grab;
  }
  .housing:active { cursor: grabbing; }
  .housing-inner {
    width: 22px; height: 22px; border-radius: 50%;
    background: #C03C22; border: 2px solid #fff;
  }
  .housing-label { font-size: 7px; font-weight: 700; color: #fff; margin-top: 2px; letter-spacing: 0.5px; }
  #tape-wrap {
    width: 64px; background: #F5C842;
    border: 2px solid #C8951A; border-top: none;
    border-radius: 0 0 6px 6px; overflow: hidden;
    min-height: 4px;
  }
  canvas { display: block; width: 64px; }
  .hook {
    width: 48px; height: 18px; background: #ccc;
    border: 2px solid #999; border-radius: 4px;
    cursor: ns-resize; display: flex; align-items: center;
    justify-content: center; font-size: 12px; color: #555;
  }
  /* Wrapper yang bisa di-drag dan di-rotate */
  #meter-wrapper {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    touch-action: none;
  }
  .rotate-btn {
    width: 64px; height: 24px; background: #555;
    border-radius: 4px; display: flex; align-items: center;
    justify-content: center; font-size: 11px; color: #fff;
    cursor: pointer; margin-bottom: 4px;
    user-select: none;
  }
  .rotate-btn:hover { background: #333; }
</style>
</head>
<body>

<div id="meter-wrapper">
  <div class="rotate-btn" id="rotate-btn">↻ Putar</div>
  <div class="tape-column">
    <div class="housing" id="housing">
      <div class="housing-inner"></div>
      <span class="housing-label">METERAN</span>
    </div>
    <div id="tape-wrap"><canvas id="ruler-canvas"></canvas></div>
    <div class="hook" id="hook">⟷</div>
  </div>
</div>

<script>
const tapeWrap = document.getElementById('tape-wrap');
const hook = document.getElementById('hook');
const canvas = document.getElementById('ruler-canvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('meter-wrapper');
const housing = document.getElementById('housing');
const rotateBtn = document.getElementById('rotate-btn');

const MAX_CM = 30;
const TAPE_W = 64;
const PX_PER_CM = 10;

let tapePx = 0;

// ── DRAW RULER ──────────────────────────────────────────────
function drawRuler(heightPx) {
  const totalCm = Math.ceil(heightPx / PX_PER_CM) + 1;
  const h = Math.max(totalCm * PX_PER_CM + 10, 10);
  canvas.width = TAPE_W;
  canvas.height = h;
  canvas.style.height = h + 'px';

  ctx.fillStyle = '#F5C842';
  ctx.fillRect(0, 0, TAPE_W, h);

  for (let mm = 0; mm <= totalCm * 10; mm++) {
    const y = mm * (PX_PER_CM / 10);
    let tickW, lw;
    if (mm % 100 === 0)     { tickW = 32; lw = 1.5; }
    else if (mm % 50 === 0) { tickW = 24; lw = 1.2; }
    else if (mm % 10 === 0) { tickW = 18; lw = 1.0; }
    else if (mm % 5 === 0)  { tickW = 12; lw = 0.7; }
    else                    { tickW = 7;  lw = 0.5; }
    ctx.strokeStyle = '#8A6010';
    ctx.lineWidth = lw;
    ctx.beginPath();
    ctx.moveTo(TAPE_W, y);
    ctx.lineTo(TAPE_W - tickW, y);
    ctx.stroke();
  }

  ctx.fillStyle = '#5A3A08';
  ctx.font = 'bold 11px Arial, sans-serif';
  ctx.textAlign = 'right';
  for (let cm = 5; cm <= totalCm; cm += 5) {
    ctx.fillText(cm, TAPE_W - 34, cm * PX_PER_CM + 4);
  }
}

function updateTape(px) {
  tapePx = Math.max(0, Math.min(px, MAX_CM * PX_PER_CM));
  tapeWrap.style.height = tapePx + 'px';
  drawRuler(tapePx);
}

drawRuler(0);

// ── DRAG TAPE (hook) ─────────────────────────────────────────
let tapeDragging = false, tapeStartY = 0, tapeStartPx = 0;

hook.addEventListener('mousedown', e => {
  tapeDragging = true; tapeStartY = e.clientY; tapeStartPx = tapePx;
  document.body.style.cursor = 'ns-resize'; e.preventDefault(); e.stopPropagation();
});
hook.addEventListener('touchstart', e => {
  tapeDragging = true; tapeStartY = e.touches[0].clientY; tapeStartPx = tapePx;
  e.preventDefault(); e.stopPropagation();
}, { passive: false });

document.addEventListener('mousemove', e => {
  if (tapeDragging) updateTape(tapeStartPx + (e.clientY - tapeStartY));
});
document.addEventListener('touchmove', e => {
  if (tapeDragging) { updateTape(tapeStartPx + (e.touches[0].clientY - tapeStartY)); e.preventDefault(); }
}, { passive: false });
document.addEventListener('mouseup', () => { tapeDragging = false; document.body.style.cursor = ''; });
document.addEventListener('touchend', () => { tapeDragging = false; });

// ── DRAG WRAPPER (housing) ───────────────────────────────────
let moveDragging = false, moveStartX = 0, moveStartY = 0;
let wrapX = window.innerWidth / 2 - 32, wrapY = 50;
let rotation = 0;

function applyTransform() {
  wrapper.style.left = wrapX + 'px';
  wrapper.style.top  = wrapY + 'px';
  wrapper.style.transform = `rotate(${rotation}deg)`;
}
applyTransform();

housing.addEventListener('mousedown', e => {
  moveDragging = true;
  moveStartX = e.clientX - wrapX;
  moveStartY = e.clientY - wrapY;
  e.preventDefault();
});
housing.addEventListener('touchstart', e => {
  moveDragging = true;
  moveStartX = e.touches[0].clientX - wrapX;
  moveStartY = e.touches[0].clientY - wrapY;
  e.preventDefault();
}, { passive: false });

document.addEventListener('mousemove', e => {
  if (moveDragging) {
    wrapX = e.clientX - moveStartX;
    wrapY = e.clientY - moveStartY;
    applyTransform();
  }
});
document.addEventListener('touchmove', e => {
  if (moveDragging) {
    wrapX = e.touches[0].clientX - moveStartX;
    wrapY = e.touches[0].clientY - moveStartY;
    applyTransform();
    e.preventDefault();
  }
}, { passive: false });
document.addEventListener('mouseup', () => { moveDragging = false; });
document.addEventListener('touchend', () => { moveDragging = false; });

// ── ROTATE BUTTON ────────────────────────────────────────────
rotateBtn.addEventListener('click', () => {
  rotation = (rotation + 90) % 360;
  applyTransform();
});
</script>
</body>
</html>
